<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>게시판</title>
  <link rel="stylesheet" href="/assets/css/style.css"></link>
</head>
<body>
<div class="globalBox">
  <h2 id="boardWrite">${title}</h2>
  <div id="titleBox">
    <span >제목</span>
    <input type="text" placeholder="제목을 입력하세요"></input>
  </div>
  <div id="writerBox">
    <div id="writerBoxLeft">
      <span>작성자</span>
      <input type="text" readonly="readonly" placeholder="${writer}"></input>
    </div>
    <div class="writerBoxRight">
      <span>작성일</span>
      <input type="text" readonly="readonly" placeholder="${createDt}"></input>
    </div>
  </div>
  <span id="contentTitle">내용</span>
  <textarea id="content" readonly="readonly" required>${content}</textarea>
<!--  <div id="content" contenteditable="true"></div>-->
  <div id="buttonBox">
  <form id="buttonForm">
    <input type="submit" value="수정" readonly="readonly"></input>
    <input type="submit" value="삭제" readonly="readonly"></input>
    <input type="submit" value="목록이동" readonly="readonly"></input>
  </form>
  </div>
</div>
<script src="/assets/js/board-detail.js"></script>
</body>
</html>
